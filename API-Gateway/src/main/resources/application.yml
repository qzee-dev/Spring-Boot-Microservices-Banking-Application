server:
  port: 8085

app:
  config:
    keycloak:
      url: ${APP_CONFIG_KEYCLOAK_URL}
      realm: ${APP_CONFIG_KEYCLOAK_REALM}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics

  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        - id: fund-transfer-service
          uri: lb://fund-transfer-service
          predicates:
            - Path=/api/fund-transfers/**

        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/accounts/**

        - id: sequence-generator
          uri: lb://sequence-generator
          predicates:
            - Path=/sequence/**

        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/transactions/**

  security:
    oauth2:

      client:
        provider:
          keycloak:
            token-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}/protocol/openid-connect/token
            authorization-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}/protocol/openid-connect/auth
            user-info-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username
            jwk-set-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}/protocol/openid-connect/certs
            user-info-authentication-method: header

        registration:
          banking-service-client:
            provider: keycloak
            client-id: banking-service-client
            client-secret: Au6eAD2JgB5MH0G2tNrPLfKqObswfSPb
            authorization-grant-type: authorization_code
            client-name: Banking Service Client
            redirect-uri: http://keycloak:8085/login/oauth2/code/keycloak
            scope: openid

      resourceserver:
        jwt:
          issuer-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}
          jwk-set-uri: ${app.config.keycloak.url}/realms/${app.config.keycloak.realm}/protocol/openid-connect/certs