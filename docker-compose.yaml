services:


  
  # ======================
  # KEYCLOAK (AUTH SERVER)
  # ======================
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.3
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    networks:
      - banking-network

  # ======================
  # API-GATWAY 
  # ======================
  api-gateway:
    build: ./API-Gateway
    container_name: api-gateway
    ports:
      - "8085:8085"
    environment:
      APP_CONFIG_KEYCLOAK_URL: http://keycloak:8080
      APP_CONFIG_KEYCLOAK_REALM: banking-service
    depends_on:
      service-registry:
        condition: service_healthy
    networks:
      - banking-network
  # ======================
  # USER-SERVICE
  # ======================
  user-service:
    build: ./User-Service
    container_name: user-service
    depends_on:
      service-registry:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user_service?autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
    networks:
      - banking-network
  # ======================
  # ACCOUNT-SERVICE
  # ======================
  account-service:
    build: ./Account-Service
    container_name: account-service
    depends_on:
      service-registry:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/account_service?autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
    networks:
      - banking-network
  # ======================
  # FUND-TRANSFER 
  # ======================
  fund-transfer-service:
    build: ./Fund-Transfer  # ✅ FIX PATH
    container_name: fund-transfer-service
    ports:
      - "8086:8086"
    depends_on:
      service-registry:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fund_transfer_service?autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
    networks:
      - banking-network
  # ======================
  # TRANSACTION-SERVICE
  # ======================
  transaction-service:
    build: ./Transaction-Service
    container_name: transaction-service
    depends_on:
      service-registry:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/transaction_service?autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
    networks:
      - banking-network
  # ======================
  # SEQUENCE-GENERATOR 
  # ======================
  sequence-generator:
    build: ./Sequence-Generator
    container_name: sequence-generator
    depends_on:
      service-registry:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sequence_service?autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
    networks:
      - banking-network
  # ======================
  #SERVICE-REGISTERY
  # ======================
  service-registry:
    build: ./Service-Registry
    container_name: service-registry
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network
  # ======================
  # MYSQL
  # ======================
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - banking-network

networks:
  banking-network:
